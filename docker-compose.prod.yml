version: "3.9"

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: studvisor
      POSTGRES_USER: studvisor
      POSTGRES_PASSWORD: ${DB_PASSWORD:-studvisor_pass}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studvisor"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: always
    environment:
      DATABASE_URL: postgresql://studvisor:${DB_PASSWORD:-studvisor_pass}@db:5432/studvisor
      SECRET_KEY: ${SECRET_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      AI_MODE: ${AI_MODE:-mock}
    depends_on:
      db:
        condition: service_healthy
    # In production, we don't seed on every start. Seeding should be a manual job.
    command: ["uvicorn", "backend.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "4"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata_prod:
